name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  # ─── Build binaries ──────────────────────────────────────────────────────────

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-arm64
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: win32-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Collect binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tsmetrics dist/tsmetrics
          chmod +x dist/tsmetrics

      - name: Collect binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/tsmetrics.exe dist/tsmetrics.exe

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: dist/
          if-no-files-found: error

  # ─── GitHub Release ──────────────────────────────────────────────────────────
  # Must run before publish-npm so the binaries exist when postinstall runs.

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/

      - name: Bundle release archives
        run: |
          mkdir -p release-assets
          VERSION=${GITHUB_REF_NAME}

          tar -czf release-assets/tsmetrics-${VERSION}-darwin-arm64.tar.gz \
            -C artifacts/binary-darwin-arm64 tsmetrics

          tar -czf release-assets/tsmetrics-${VERSION}-darwin-x64.tar.gz \
            -C artifacts/binary-darwin-x64 tsmetrics

          tar -czf release-assets/tsmetrics-${VERSION}-linux-x64.tar.gz \
            -C artifacts/binary-linux-x64 tsmetrics

          tar -czf release-assets/tsmetrics-${VERSION}-linux-arm64.tar.gz \
            -C artifacts/binary-linux-arm64 tsmetrics

          cd artifacts/binary-win32-x64
          zip ../../release-assets/tsmetrics-${VERSION}-win32-x64.zip tsmetrics.exe
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          generate_release_notes: true
          files: release-assets/*

  # ─── Publish to npm ──────────────────────────────────────────────────────────
  # Runs after github-release so postinstall can download the binary.

  publish-npm:
    name: Publish npm package
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into package.json
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          node -e "
            const fs = require('fs');
            const p = 'npm/tsmetrics/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish tsmetrics
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/tsmetrics
          npm publish --access public
